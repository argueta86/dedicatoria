<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para tu 🌸</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#99b6ef,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

.contenedor{
background:rgb(242, 155, 223);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:420px;
animation:aparecer 2s;
}

@keyframes aparecer{
from{opacity:0; transform:scale(0.5);}
to{opacity:1; transform:scale(1);}
}

h1{
color:#ff4d6d;
}

.mensaje{
font-size:18px;
margin-top:20px;
color:#444;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#f369e3;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#92db80;
}

.final{
display:none;
margin-top:20px;
animation:aparecer 2s;
}

.final img{
width:200px;
height:200px;
border-radius:15%;
margin:10px;
border:5px solid #ff4d6d;
box-shadow: 0 8px 20px rgb(0,0,0,0.3);
object-fit: cover;
}

.final p{
font-size:20px;
color:#ff4d6d;
margin-top:10px;
}

.flor{
position:absolute;
font-size:20px;
animation:flotar 5s linear infinite;
}

@keyframes flotar{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-800px); opacity:0;}
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🌸 Pequeña Su 🌸</h1>

<p class="mensaje">
Eres una persona muy importante y especial,
nunca lo olvides a pesar de todas las circunstancias
y obstáculos que la vida te ponga, siempre confía en Dios. 🌷
</p>

<button onclick="mostrar()">Haz clic aquí 🌼</button>

<div class="final" id="final">

<img src="foto.jpg">
<img src="pequeña.jpg">

<p>
Quiero que sepas que eres muy importante para mí.    
Espero que la conosidostad que tenemos dure mucho tiempo. 🌸
</p>

</div>

</div>

<script>

function mostrar(){
document.getElementById("final").style.display="block";
}

function flores(){

const flor=document.createElement("div");
flor.classList.add("flor");

flor.innerHTML="🌸";

flor.style.left=Math.random()*100+"vw";

flor.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(flor);

setTimeout(()=>{
flor.remove();
},5000);

}

setInterval(flores,300);

</script>

</body>
</html>
